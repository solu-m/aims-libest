services:
  # Nginx Gateway - Single Port Entry Point
  gateway:
    image: nginx:1.25-alpine
    container_name: est-gateway
    hostname: gateway
    ports:
      - "8085:8085"
    networks:
      - est-network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./certs/server.key:/etc/nginx/ssl/server.key:ro
    depends_on:
      - est-server-backend
      - admin-api
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Multi-Tenant EST Server (backend on port 8086)
  est-server-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: est-server-backend
    hostname: est-server-backend
    expose:
      - "8086"
    networks:
      - est-network
    volumes:
      - tenant-data:/opt/est/tenants
      - registry-data:/opt/est/data
      - ./logs:/opt/est/logs
    environment:
      - EST_LOG_LEVEL=verbose
      - EST_PORT=8086
    command: >
      /opt/est/bin/estserver -v -p 8086 
      -c /opt/est/certs/server.crt 
      -k /opt/est/certs/server.key 
      -r estCA -b
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:8086/.well-known/est/gateway/cacerts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Admin API - Tenant Management (backend on port 8087)
  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    container_name: admin-api
    hostname: admin-api
    expose:
      - "8087"
    networks:
      - est-network
    volumes:
      - tenant-data:/opt/est/tenants
      - registry-data:/opt/est/data
      - ./admin-api:/app:ro
    environment:
      - TENANT_DATA_DIR=/opt/est/tenants
      - REGISTRY_DB=/opt/est/data/tenant_registry.db
      - ADMIN_API_KEY=${ADMIN_API_KEY:-your-secret-admin-key-here}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/admin/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Test Client Container
  test-client:
    image: ubuntu:22.04
    container_name: est-test-client
    hostname: test-client
    networks:
      - est-network
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./test-results:/test-results
      - ./docker-test.sh:/docker-test.sh
    command: >
      bash -c "
        apt-get update && 
        apt-get install -y openssl curl jq &&
        chmod +x /docker-test.sh &&
        /docker-test.sh
      "
    profiles:
      - test

networks:
  est-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  tenant-data:
    driver: local
    labels:
      - "com.example.description=Multi-tenant CA certificate databases"
  registry-data:
    driver: local
    labels:
      - "com.example.description=Tenant registry database"
