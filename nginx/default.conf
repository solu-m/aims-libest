# Nginx Gateway Configuration - Single Port Architecture
# Routes all requests through single port 8085

upstream est_server {
    server est-server-backend:8086;
}

upstream admin_api {
    server admin-api:8087;
}

server {
    listen 8085 ssl;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # EST Protocol Endpoints (proxy to EST server)
    location /.well-known/est/ {
        proxy_pass https://est_server;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # EST protocol requires these
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 10M;
    }

    # Admin API Endpoints (proxy to Python FastAPI)
    location /admin/ {
        proxy_pass http://admin_api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # For JSON responses
        proxy_set_header Content-Type application/json;
        client_max_body_size 1M;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
